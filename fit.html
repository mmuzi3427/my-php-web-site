<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 300px; width: 100%; }
        .stats { padding: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="stats">
    Masofa: <span id="distance">0</span> km<br>
    Tezlik: <span id="speed">0</span> km/soat
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([40.6, 72.1], 15); // Boshlang'ich koordinata
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let marker = L.marker([40.6, 72.1]).addTo(map);
    let totalDistance = 0;
    let lastPoint = null;

    function success(pos) {
        const { latitude, longitude, speed } = pos.coords;
        
        // Xaritani yangilash
        map.setView([latitude, longitude]);
        marker.setLatLng([latitude, longitude]);

        // Masofani hisoblash
        if (lastPoint) {
            let dist = map.distance(lastPoint, [latitude, longitude]) / 1000;
            totalDistance += dist;
            document.getElementById('distance').innerText = totalDistance.toFixed(3);
        }
        
        lastPoint = [latitude, longitude];
        document.getElementById('speed').innerText = (speed ? speed * 3.6 : 0).toFixed(1);
    }

    navigator.geolocation.watchPosition(success, console.error, { 
        enableHighAccuracy: true,
        timeout: 5000 
    });
</script>
</body>
</html>
